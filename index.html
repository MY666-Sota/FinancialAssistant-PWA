<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f8fb">
  <meta name="color-scheme" content="light">
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>基金雷达</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --surface-2: #eef2f7;
      --ink: #111827;
      --muted: #64748b;
      --line: #d9e0ea;
      --red: #d9363e;
      --green: #11845b;
      --blue: #2563eb;
      --amber: #b7791f;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
    }

    button,
    summary {
      font: inherit;
    }

    button {
      border: 0;
      background: transparent;
      color: inherit;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      padding-bottom: calc(76px + env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: calc(12px + env(safe-area-inset-top)) 16px 10px;
      background: rgba(247, 248, 251, 0.92);
      border-bottom: 1px solid rgba(217, 224, 234, 0.86);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      color: #ffffff;
      background: linear-gradient(135deg, #15213b 0%, #2563eb 58%, #16a34a 100%);
      font-weight: 800;
      font-size: 13px;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.24);
    }

    .brand-title {
      min-width: 0;
    }

    .brand-title strong {
      display: block;
      overflow: hidden;
      font-size: 18px;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-title span {
      display: block;
      margin-top: 3px;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
    }

    .icon-button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
    }

    .view {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      padding: 14px 14px 0;
    }

    .hero {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid rgba(217, 224, 234, 0.9);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero-main {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .big-number {
      margin-top: 5px;
      font-size: clamp(38px, 12vw, 54px);
      font-weight: 800;
      line-height: 0.98;
      letter-spacing: 0;
    }

    .hero-status {
      display: grid;
      gap: 6px;
      min-width: 92px;
      text-align: right;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      color: #1f2937;
      background: var(--surface-2);
      font-size: 12px;
      white-space: nowrap;
    }

    .status-pill.good {
      color: #075c43;
      background: rgba(17, 132, 91, 0.12);
    }

    .status-pill.warn {
      color: #7a4f00;
      background: rgba(183, 121, 31, 0.14);
    }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric {
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfe;
    }

    .metric b {
      display: block;
      overflow-wrap: anywhere;
      font-size: 18px;
      line-height: 1.2;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .section {
      margin-top: 14px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 2px 9px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
    }

    .section-head span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 58px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .row-main {
      min-width: 0;
    }

    .row-main strong {
      display: block;
      overflow: hidden;
      font-size: 15px;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .row-main span,
    .row-sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .row-value {
      text-align: right;
      font-weight: 750;
      white-space: nowrap;
    }

    .pos {
      color: var(--red);
    }

    .neg {
      color: var(--green);
    }

    .muted {
      color: var(--muted);
    }

    .fund-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      overflow: hidden;
    }

    .fund-card summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 74px;
      padding: 14px;
      list-style: none;
      cursor: pointer;
    }

    .fund-card summary::-webkit-details-marker {
      display: none;
    }

    .fund-name {
      min-width: 0;
    }

    .fund-name strong {
      display: block;
      overflow: hidden;
      font-size: 16px;
      line-height: 1.3;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fund-name span {
      display: block;
      margin-top: 4px;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fund-change {
      text-align: right;
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
    }

    .fund-body {
      padding: 0 14px 14px;
      border-top: 1px solid var(--line);
    }

    .fact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0;
    }

    .fact {
      min-width: 0;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--surface-2);
    }

    .fact b {
      display: block;
      overflow-wrap: anywhere;
      font-size: 15px;
      line-height: 1.25;
    }

    .fact span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .chart {
      width: 100%;
      min-height: 168px;
      margin-top: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfe;
    }

    .chart svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .bars {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(78px, 1fr) minmax(0, 1.8fr) 48px;
      gap: 8px;
      align-items: center;
      min-height: 26px;
      font-size: 12px;
    }

    .bar-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar-track {
      height: 8px;
      border-radius: 999px;
      background: var(--surface-2);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2563eb, #16a34a);
    }

    .bar-value {
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    .matrix-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .matrix {
      min-width: 560px;
    }

    .matrix-row {
      display: grid;
      grid-template-columns: 130px repeat(var(--fund-count), minmax(68px, 1fr));
      min-height: 42px;
      border-bottom: 1px solid var(--line);
    }

    .matrix-row:last-child {
      border-bottom: 0;
    }

    .matrix-cell {
      display: flex;
      align-items: center;
      min-width: 0;
      padding: 8px;
      border-right: 1px solid var(--line);
      font-size: 12px;
      line-height: 1.2;
    }

    .matrix-cell:last-child {
      border-right: 0;
    }

    .matrix-head {
      color: var(--muted);
      background: #fbfcfe;
      font-weight: 700;
    }

    .heat {
      justify-content: flex-end;
      color: #0f172a;
      font-variant-numeric: tabular-nums;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 128px;
      padding: 22px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      line-height: 1.5;
    }

    .data-line {
      display: grid;
      gap: 6px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .data-line:last-child {
      border-bottom: 0;
    }

    .data-line strong {
      font-size: 14px;
    }

    .data-line code {
      display: block;
      overflow-wrap: anywhere;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .bottom-nav {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      background: rgba(255, 255, 255, 0.94);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .nav-btn {
      display: grid;
      place-items: center;
      min-height: 48px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .nav-btn.active {
      color: #ffffff;
      background: #15213b;
    }

    .toast {
      position: fixed;
      right: 14px;
      bottom: calc(86px + env(safe-area-inset-bottom));
      left: 14px;
      z-index: 40;
      display: none;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: var(--surface);
      box-shadow: var(--shadow);
      font-size: 13px;
      line-height: 1.4;
    }

    .toast.show {
      display: block;
    }

    @media (min-width: 720px) {
      .view {
        padding-top: 18px;
      }

      .hero {
        padding: 22px;
      }

      .list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .fund-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">FR</div>

          <strong>基金雷达</strong>

        <button class="icon-button" id="refreshBtn" title="刷新" aria-label="刷新">

            <path d="M3 12A9 9 0 0 1 18.4 5.7"></path>

  <div class="toast" id="toast"></div>

  <script>

      ],

    };

    const SAMPLE_DATA = {

          returns: { last_1_month_pct: -1.2, last_3_month_pct: 3.6, last_6_month_pct: 8.9, last_1_year_pct: 10.1 },
          top_holdings: [

        { stock_code: "688981", stock_name: "中芯国际", appear_count: 2, total_ratio: 13.18, funds: [{ code: "008585", ratio: 6.41 }, { code: "270042", ratio: 6.77 }] },
        { stock_code: "300308", stock_name: "中际旭创", appear_count: 2, total_ratio: 11.59, funds: [{ code: "008585", ratio: 5.66 }, { code: "012588", ratio: 5.93 }] },
        { stock_code: "002475", stock_name: "立讯精密", appear_count: 2, total_ratio: 9.83, funds: [{ code: "012588", ratio: 4.52 }, { code: "270042", ratio: 5.31 }] }
      ],
      status: { ok: true, errors: [] }
    };

    const state = {
      tab: "dashboard",
      data: null,
      sourceLabel: "",
      deferredInstallPrompt: null
    };

    const tabs = [
      { key: "dashboard", label: "看板" },
      { key: "overlap", label: "重仓" },
      { key: "funds", label: "基金" },
      { key: "data", label: "数据" }
    ];

    function demoTrend(start, end, count) {
      const pad = (value) => String(value).padStart(2, "0");
      return Array.from({ length: count }, (_, index) => {
        const ratio = index / (count - 1);
        const wave = Math.sin(index / 7) * 0.018 + Math.cos(index / 13) * 0.012;
        const date = new Date(2026, 0, 1 + index);
        const dateText = `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
        return {
          date: dateText,
          nav: Number((start + (end - start) * ratio + wave).toFixed(4)),
          change_pct: Number((wave * 100).toFixed(2))
        };
      });
    }

    function $(selector) {
      return document.querySelector(selector);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function isFiniteNumber(value) {
      const number = Number(value);
      return Number.isFinite(number);
    }

    function asNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    function pctClass(value) {
      const number = asNumber(value);
      if (number === null || number === 0) return "muted";
      return number > 0 ? "pos" : "neg";
    }

    function fmtPct(value) {
      const number = asNumber(value);
      if (number === null) return "--";
      const sign = number > 0 ? "+" : "";
      return `${sign}${number.toFixed(2)}%`;
    }

    function fmtNumber(value, digits = 4) {
      const number = asNumber(value);
      if (number === null) return "--";
      return number.toFixed(digits);
    }

    function compactName(fund) {
      return fund.alias || fund.name || fund.code;
    }

    function isPlaceholder(url) {
      return !url || url.includes("你的用户名") || url.includes("你的仓库名");
    }

    function withTs(url) {
      const sep = url.includes("?") ? "&" : "?";
      return `${url}${sep}ts=${Date.now()}`;
    }

    function validateData(data) {
      if (!data || typeof data !== "object" || Array.isArray(data)) {
        throw new Error("data payload must be an object");
      }
      if (typeof data.generated_at !== "string" || !data.generated_at.trim()) {
        throw new Error("data payload is missing generated_at");
      }
      if (!Array.isArray(data.funds)) {
        throw new Error("data payload is missing the funds array");
      }
      const invalidFund = data.funds.find(
        (fund) => !fund || typeof fund !== "object" || !/^\d{6}$/.test(String(fund.code || ""))
      );
      if (invalidFund) {
        throw new Error("data payload contains an invalid fund code");
      }
      return data;
    }

    async function fetchJson(url) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), CONFIG.requestTimeoutMs);
      try {
        const response = await fetch(withTs(url), {
          cache: "no-store",
          mode: "cors",
          signal: controller.signal
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } finally {
        clearTimeout(timer);
      }
    }

    async function loadScriptData(url) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const previous = window.__FUND_DATA__;
        let settled = false;
        const finish = (callback, value) => {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          script.remove();
          callback(value);
        };
        const timer = setTimeout(
          () => finish(reject, new Error(`script load timed out: ${url}`)),
          CONFIG.requestTimeoutMs
        );
        script.src = withTs(url);
        script.async = true;
        script.onload = () => {
          if (window.__FUND_DATA__ && window.__FUND_DATA__ !== previous) {
            finish(resolve, window.__FUND_DATA__);
          } else {
            finish(reject, new Error("data.js did not expose window.__FUND_DATA__"));
          }
        };
        script.onerror = () => finish(reject, new Error(`script load failed: ${url}`));
        document.head.appendChild(script);
      });
    }

    async function loadData() {
      const urlParam = new URLSearchParams(location.search).get("data");
      const dataUrls = [urlParam, ...CONFIG.dataUrls].filter((url) => url && !isPlaceholder(url));
      const scriptUrls = CONFIG.dataScriptUrls.filter((url) => url && !isPlaceholder(url));
      const errors = [];

      for (const url of dataUrls) {
        try {
          const data = validateData(await fetchJson(url));
          localStorage.setItem("fundRadar:lastData", JSON.stringify(data));
          return { data, source: url };
        } catch (error) {
          errors.push(`${url}: ${error.message}`);
        }
      }

      for (const url of scriptUrls) {
        try {
          const data = validateData(await loadScriptData(url));
          localStorage.setItem("fundRadar:lastData", JSON.stringify(data));
          return { data, source: url };
        } catch (error) {
          errors.push(`${url}: ${error.message}`);
        }
      }

      try {
        const cached = validateData(JSON.parse(localStorage.getItem("fundRadar:lastData")));
        return { data: cached, source: "本机缓存" };
      } catch (_) {
        // Ignore broken local cache.
      }

      return { data: SAMPLE_DATA, source: "内置演示数据", errors };
    }

    function freshText(data) {
      if (!data || !data.generated_at) return "未更新";
      const time = new Date(data.generated_at);
      if (Number.isNaN(time.getTime())) return data.generated_at;
      const diffHours = (Date.now() - time.getTime()) / 3600000;
      if (diffHours < 1) return "刚刚更新";
      if (diffHours < 24) return `${Math.floor(diffHours)}小时前`;
      return `${Math.floor(diffHours / 24)}天前`;
    }

    function health(data) {
      const overview = data.overview || {};
      const total = overview.fund_count || (data.funds || []).length || 0;
      const ok = overview.ok_count || 0;
      if (!total) return 0;
      return Math.round((ok / total) * 100);
    }

    function renderNav() {
      $("#bottomNav").innerHTML = tabs.map((tab) => `
        <button class="nav-btn ${state.tab === tab.key ? "active" : ""}" data-tab="${tab.key}">
          ${tab.label}
        </button>
      `).join("");
      document.querySelectorAll(".nav-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.tab = btn.dataset.tab;
          render();
        });
      });
    }

    function renderHero(data) {
      const overview = data.overview || {};
      const avg = overview.avg_estimate_pct;
      const isDemo = data.version === "demo";
      const hasStaleData = Number(overview.stale_count || 0) > 0;
      const modeLabel = isDemo ? "演示" : hasStaleData ? "含缓存" : "实盘";
      const healthScore = health(data);
      return `
        <section class="hero">
          <div class="hero-main">
            <div>
              <div class="eyebrow">组合估算涨跌</div>
              <div class="big-number ${pctClass(avg)}">${fmtPct(avg)}</div>
            </div>
            <div class="hero-status">
              <span class="status-pill ${healthScore >= 90 ? "good" : "warn"}">${healthScore}% 健康</span>
              <span class="status-pill ${isDemo || hasStaleData ? "warn" : "good"}">${modeLabel}</span>
            </div>
          </div>
          <div class="metric-strip">
            <div class="metric"><b>${overview.up_count ?? "--"}</b><span>上涨</span></div>
            <div class="metric"><b>${overview.down_count ?? "--"}</b><span>下跌</span></div>
            <div class="metric"><b>${overview.fund_count ?? "--"}</b><span>基金</span></div>
          </div>
        </section>
      `;
    }

    function renderDashboard(data) {
      const funds = [...(data.funds || [])];
      const movers = funds
        .map((fund) => ({ fund, pct: asNumber(fund.estimate && fund.estimate.pct) }))
        .filter((item) => item.pct !== null)
        .sort((a, b) => Math.abs(b.pct) - Math.abs(a.pct))
        .slice(0, 5);
      const crowded = (data.overlap_holdings || []).slice(0, 4);

      return `
        ${renderHero(data)}
        <section class="section">
          <div class="section-head">
            <h2>今日波动</h2>
            <span>${freshText(data)}</span>
          </div>
          <div class="list">
            ${movers.map(({ fund, pct }) => `
              <div class="row">
                <div class="row-main">
                  <strong>${escapeHtml(compactName(fund))}</strong>
                  <span>${escapeHtml(fund.code)} · ${escapeHtml((fund.estimate || {}).time || fund.nav_date || "--")}</span>
                </div>
                <div class="row-value ${pctClass(pct)}">${fmtPct(pct)}</div>
              </div>
            `).join("") || `<div class="empty">暂无估值数据</div>`}
          </div>
        </section>
        <section class="section">
          <div class="section-head">
            <h2>拥挤提醒</h2>
            <span>前十大重仓</span>
          </div>
          <div class="list">
            ${crowded.map((item) => `
              <div class="row">
                <div class="row-main">
                  <strong>${escapeHtml(item.stock_name)}</strong>
                  <span>${escapeHtml(item.stock_code)} · ${item.appear_count}只基金重复持有</span>
                </div>
                <div class="row-value">${fmtPct(item.total_ratio)}</div>
              </div>
            `).join("") || `<div class="empty">当前自选基金没有重复重仓股</div>`}
          </div>
        </section>
      `;
    }

    function lineChart(points) {
      const clean = (points || []).filter((point) => isFiniteNumber(point.nav)).slice(-180);
      if (clean.length < 2) return `<div class="empty">暂无净值曲线</div>`;
      const width = 320;
      const height = 158;
      const padX = 16;
      const top = 14;
      const axisY = 112;
      const labelY = 142;
      const values = clean.map((point) => Number(point.nav));
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const coords = clean.map((point, index) => {
        const x = padX + (index / (clean.length - 1)) * (width - padX * 2);
        const y = axisY - ((Number(point.nav) - min) / range) * (axisY - top);
        return [x, y];
      });
      const line = coords.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(" ");
      const area = `${padX},${axisY} ${line} ${width - padX},${axisY}`;
      const tickIndexes = [0, 0.25, 0.5, 0.75, 1]
        .map((ratio) => Math.round((clean.length - 1) * ratio))
        .filter((index, pos, arr) => arr.indexOf(index) === pos);
      const shortDate = (date) => {
        const text = String(date || "");
        const match = text.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        return match ? `${match[1].slice(2)}/${match[2]}/${match[3]}` : text;
      };
      const ticks = tickIndexes.map((index) => {
        const [x] = coords[index];
        const date = clean[index].date || "";
        const anchor = index === 0 ? "start" : index === clean.length - 1 ? "end" : "middle";
        return `
          <line x1="${x.toFixed(1)}" y1="${top}" x2="${x.toFixed(1)}" y2="${axisY}" stroke="#d9e0ea" stroke-width="1" stroke-dasharray="3 4"></line>
          <line x1="${x.toFixed(1)}" y1="${axisY}" x2="${x.toFixed(1)}" y2="${axisY + 5}" stroke="#94a3b8" stroke-width="1"></line>
          <text x="${x.toFixed(1)}" y="${labelY}" text-anchor="${anchor}" fill="#64748b" font-size="9.5">${escapeHtml(shortDate(date))}</text>
          <title>${escapeHtml(date)}</title>
        `;
      }).join("");
      return `
        <div class="chart">
          <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="净值曲线，时间轴从${escapeHtml(clean[0].date || "")}到${escapeHtml(clean[clean.length - 1].date || "")}">
            <defs>
              <linearGradient id="areaFill" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"></stop>
                <stop offset="100%" stop-color="#2563eb" stop-opacity="0.02"></stop>
              </linearGradient>
            </defs>
            <text x="${padX}" y="11" fill="#64748b" font-size="9.5">时间轴 ${escapeHtml(clean[0].date || "")} 至 ${escapeHtml(clean[clean.length - 1].date || "")}</text>
            ${ticks}
            <line x1="${padX}" y1="${axisY}" x2="${width - padX}" y2="${axisY}" stroke="#94a3b8" stroke-width="1"></line>
            <polyline points="${area}" fill="url(#areaFill)" stroke="none"></polyline>
            <polyline points="${line}" fill="none" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></polyline>
          </svg>
        </div>
      `;
    }

    function renderHoldingBars(fund) {
      const holdings = (fund.top_holdings || []).slice(0, 10);
      if (!holdings.length) return `<div class="empty">暂无重仓数据</div>`;
      const max = Math.max(...holdings.map((item) => asNumber(item.ratio) || 0), 1);
      return `
        <div class="bars">
          ${holdings.map((item) => {
            const ratio = asNumber(item.ratio) || 0;
            const width = Math.max(2, (ratio / max) * 100);
            return `
              <div class="bar-row">
                <div class="bar-name">${escapeHtml(item.stock_name || item.stock_code)}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>
                <div class="bar-value">${fmtPct(ratio)}</div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function returnsBlock(fund) {
      const returns = fund.returns || {};
      const items = [
        ["近1月", returns.last_1_month_pct],
        ["近3月", returns.last_3_month_pct],
        ["近6月", returns.last_6_month_pct],
        ["近1年", returns.last_1_year_pct]
      ];
      return items.map(([label, value]) => `
        <div class="fact">
          <b class="${pctClass(value)}">${fmtPct(value)}</b>
          <span>${label}</span>
        </div>
      `).join("");
    }

    function renderFundCard(fund, index) {
      const estimate = fund.estimate || {};
      const pct = asNumber(estimate.pct);
      return `
        <details class="fund-card" ${index === 0 ? "open" : ""}>
          <summary>
            <div class="fund-name">
              <strong>${escapeHtml(compactName(fund))}</strong>
              <span>${escapeHtml(fund.code)} · ${escapeHtml(fund.name || fund.alias || "基金")}</span>
            </div>
            <div class="fund-change ${pctClass(pct)}">${fmtPct(pct)}</div>
          </summary>
          <div class="fund-body">
            <div class="fact-grid">
              <div class="fact"><b>${fmtNumber(estimate.value)}</b><span>盘中估值</span></div>
              <div class="fact"><b>${fmtNumber(fund.nav)}</b><span>最新净值 ${escapeHtml(fund.nav_date || "")}</span></div>
              <div class="fact"><b>${escapeHtml(fund.scale || "--")}</b><span>基金规模 ${escapeHtml(fund.scale_date || "")}</span></div>
              <div class="fact"><b>${escapeHtml(fund.manager || "--")}</b><span>基金经理</span></div>
              ${returnsBlock(fund)}
            </div>
            ${lineChart(fund.net_worth_trend)}
            <div class="section-head" style="margin-top:14px">
              <h2>前十大重仓</h2>
              <span>${escapeHtml(fund.holdings_report_date || "--")}</span>
            </div>
            ${renderHoldingBars(fund)}
          </div>
        </details>
      `;
    }

    function renderFunds(data) {
      const funds = data.funds || [];
      return `
        <section class="section" style="margin-top:0">
          <div class="section-head">
            <h2>基金详情</h2>
            <span>${funds.length}只</span>
          </div>
          <div class="list fund-list">
            ${funds.map(renderFundCard).join("") || `<div class="empty">暂无基金数据</div>`}
          </div>
        </section>
      `;
    }

    function renderOverlap(data) {
      const funds = data.funds || [];
      const overlap = (data.overlap_holdings || []).slice(0, 12);
      const fundCount = Math.max(funds.length, 1);
      const matrixRows = overlap.map((stock) => {
        const byCode = new Map((stock.funds || []).map((item) => [item.code, item]));
        return `
          <div class="matrix-row">
            <div class="matrix-cell"><strong>${escapeHtml(stock.stock_name)}</strong></div>
            ${funds.map((fund) => {
              const item = byCode.get(fund.code);
              const ratio = item ? asNumber(item.ratio) || 0 : 0;
              const alpha = Math.min(0.9, ratio / 12 + 0.08);
              return `<div class="matrix-cell heat" style="background:rgba(37,99,235,${ratio ? alpha : 0})">${ratio ? fmtPct(ratio) : ""}</div>`;
            }).join("")}
          </div>
        `;
      }).join("");

      return `
        <section class="section" style="margin-top:0">
          <div class="section-head">
            <h2>重仓透视</h2>
            <span>${overlap.length}个重复持仓</span>
          </div>
          ${overlap.length ? `
            <div class="matrix-wrap">
              <div class="matrix" style="--fund-count:${fundCount}">
                <div class="matrix-row">
                  <div class="matrix-cell matrix-head">股票</div>
                  ${funds.map((fund) => `<div class="matrix-cell matrix-head">${escapeHtml(fund.code)}</div>`).join("")}
                </div>
                ${matrixRows}
              </div>
            </div>
            <div class="section">
              <div class="list">
                ${overlap.slice(0, 6).map((item) => `
                  <div class="row">
                    <div class="row-main">
                      <strong>${escapeHtml(item.stock_name)}</strong>
                      <span>${escapeHtml(item.stock_code)} · ${item.appear_count}只基金</span>
                    </div>
                    <div class="row-value">${fmtPct(item.total_ratio)}</div>
                  </div>
                `).join("")}
              </div>
            </div>
          ` : `<div class="empty">暂无重复重仓股</div>`}
        </section>
      `;
    }

    function renderData(data) {
      const errors = (data.status && data.status.errors) || [];
      const status = data.status || {};
      const source = data.source || {};
      const successRate = asNumber(status.success_rate);
      const publishable = status.publishable;
      const lines = [
        ["更新时间", data.generated_at || "--"],
        ["数据入口", state.sourceLabel || "--"],
        ["主来源", source.primary || "--"],
        ["状态", status.ok ? "正常" : "存在异常"],
        ["抓取成功率", successRate === null ? "--" : `${(successRate * 100).toFixed(0)}%`],
        ["发布质量", publishable === undefined ? "--" : publishable ? "达到门槛" : "未达到门槛"],
        ["提示", source.disclaimer || "--"]
      ];
      return `
        <section class="section" style="margin-top:0">
          <div class="section-head">
            <h2>数据状态</h2>
            <span>${freshText(data)}</span>
          </div>
          <div class="fund-card" style="padding:0 14px">
            ${lines.map(([label, value]) => `
              <div class="data-line">
                <strong>${escapeHtml(label)}</strong>
                <code>${escapeHtml(value)}</code>
              </div>
            `).join("")}
          </div>
        </section>
        <section class="section">
          <div class="section-head">
            <h2>异常记录</h2>
            <span>${errors.length}项</span>
          </div>
          <div class="list">
            ${errors.map((item) => `
              <div class="row">
                <div class="row-main">
                  <strong>${escapeHtml(item.code)}</strong>
                  <span>${escapeHtml((item.errors || []).join("；"))}</span>
                </div>
              </div>
            `).join("") || `<div class="empty">暂无异常</div>`}
          </div>
        </section>
      `;
    }

    function render() {
      renderNav();
      const data = state.data;
      if (!data) {
        $("#view").innerHTML = `<div class="empty">加载中</div>`;
        return;
      }
      $("#subtitle").textContent = `${freshText(data)} · ${health(data)}%健康`;
      const map = {
        dashboard: renderDashboard,
        overlap: renderOverlap,
        funds: renderFunds,
        data: renderData
      };
      $("#view").innerHTML = map[state.tab](data);
    }

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2600);
    }

    async function boot() {
      renderNav();
      $("#view").innerHTML = `<div class="empty">加载中</div>`;
      const result = await loadData();
      state.data = result.data;
      state.sourceLabel = result.source;
      render();
      if (result.errors && result.errors.length) {
        showToast("已加载演示数据，真实数据源暂不可用");
      }
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      state.deferredInstallPrompt = event;
      $("#installBtn").hidden = false;
    });

    $("#installBtn").addEventListener("click", async () => {
      if (!state.deferredInstallPrompt) return;
      state.deferredInstallPrompt.prompt();
      await state.deferredInstallPrompt.userChoice;
      state.deferredInstallPrompt = null;
      $("#installBtn").hidden = true;
    });

    $("#refreshBtn").addEventListener("click", async () => {
      showToast("正在刷新");
      await boot();
    });

    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      navigator.serviceWorker.register("./service-worker.js").catch(() => {});
    }

    boot();
  </script>
</body>
</html>
